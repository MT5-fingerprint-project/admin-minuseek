services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CI=true
    command: pnpm dev
    networks:
      - default
      - minuseek

networks:
  minuseek:
    external: true
