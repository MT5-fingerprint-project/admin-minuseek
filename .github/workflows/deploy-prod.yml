# Déploiement PROD : déclenché par un tag v*. Le front est REBUILDÉ avec les
# variables prod, contrairement au back qui
# est promu par copie de digest.
# ⚠️ Inerte tant que la prod est au repos : nécessite GCP_SA_KEY_PROD et
# l'infra prod appliquée (bucket minuseek-front-prod).
name: deploy-prod

on:
  push:
    tags: ["v*"]

concurrency: deploy-prod

env:
  BUCKET: minuseek-front-prod
  VITE_API_URL: https://api.minuseek.fr/api
  VITE_KEYCLOAK_URL: https://auth.minuseek.fr

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Sync bucket with cache policy
        run: |
          gcloud storage rsync --recursive --delete-unmatched-destination-objects \
            dist "gs://$BUCKET"
          gcloud storage objects update "gs://$BUCKET/assets/**" \
            --cache-control="public,max-age=31536000,immutable"
          gcloud storage objects update "gs://$BUCKET/index.html" \
            --cache-control="no-cache"
